<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password | 3D Login Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="shader-bg"></canvas>
    <div class="cont">

    <div class="page-wrapper">
   <div class="left-text">
     <h3>Reset Your Password</h3>
   </div>

     <div class="right-form">
      <div class="demo">
        <div class="login">
          <div id="scene-container"></div>
          <div class="login__form">
            <h2 class="login__title">Reset Password</h2>
            <p class="login__description">
              Enter your email to receive a password reset link
            </p>

            <div class="login__row">
              <svg class="login__icon email svg-icon" viewBox="0 0 20 20">
                <path d="M0,3 20,3 20,17 0,17z M0,3 10,10 20,3" />
              </svg>
              <input
                type="email"
                class="login__input email"
                placeholder="Your Email"
              />
            </div>

            <button type="button" class="login__submit">Send Reset Link</button>
          </div>
        </div>
      </div>
    </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
