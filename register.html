<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register | 3D Login Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="shader-bg"></canvas>
    <div class="cont">

    <div class="page-wrapper">
  <div class="left-text">
    <h3 class="mirror-demo">Create Account</h3>
  </div>  

      <div class="right-form">
      <div class="demo">
        <div class="login">
          <div id="scene-container"></div>
          <div class="login__form">
            <h2 class="login__title">Create Account</h2>

            <div class="login__row">
              <svg class="login__icon name svg-icon" viewBox="0 0 20 20">
                <path
                  d="M0,20 a10,8 0 0,1 20,0z M10,0 a4,4 0 0,1 0,8 a4,4 0 0,1 0,-8"
                />
              </svg>
              <input
                type="text"
                class="login__input name"
                placeholder="Username"
              />
            </div>

            <div class="login__row">
              <svg class="login__icon email svg-icon" viewBox="0 0 20 20">
                <path d="M0,3 20,3 20,17 0,17z M0,3 10,10 20,3" />
              </svg>
              <input
                type="email"
                class="login__input email"
                placeholder="Email"
              />
            </div>

            <div class="login__row">
              <svg class="login__icon pass svg-icon" viewBox="0 0 20 20">
                <path
                  d="M0,20 20,20 20,8 0,8z M10,13 10,16z M4,8 a6,8 0 0,1 12,0"
                />
              </svg>
              <input
                type="password"
                class="login__input pass"
                placeholder="Password"
              />
            </div>

             <button type="button" class="login__submit register-btn">Register</button>
          </div>
        </div>
      </div>
    </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
